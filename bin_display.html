<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEWA Dynamic Cloud Bin</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .main-container { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 420px; border: 3px solid #2e7d32; }
        
        .capacity-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .progress-bar-bg { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.5s, background-color 0.5s; }
        
        .bin-wrapper { position: relative; width: 180px; height: 250px; margin: 20px auto; }
        .bin-body { width: 160px; height: 200px; background: #2e7d32; border-radius: 0 0 15px 15px; position: absolute; bottom: 0; left: 10px; border: 4px solid #1b5e20; display: flex; align-items: center; justify-content: center; }
        .qr-sticker { width: 120px; height: 120px; background: white; padding: 5px; border-radius: 5px; }
        .bin-lid { width: 180px; height: 15px; background: #1b5e20; border-radius: 10px; position: absolute; top: 35px; left: 0; transform-origin: left; transition: transform 0.8s; z-index: 10; }
        .bin-lid.open { transform: rotate(-110deg); }

        #waste-item { width: 60px; height: 60px; background: #37474f; color: white; border-radius: 10px; display: none; align-items: center; justify-content: center; font-size: 24px; position: absolute; top: -20px; right: -40px; cursor: grab; z-index: 15; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .status-badge { font-size: 1.5rem; font-weight: bold; color: #2e7d32; margin-bottom: 5px; }
        
        .sensor-toggle { margin-top: 15px; padding: 15px; background: #e8f5e9; border-radius: 8px; display: none; text-align: left; }
        .item-dropdown { width: 100%; padding: 8px; margin-bottom: 12px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="status-badge" id="status-text">Connecting...</div>
    <p id="message" style="color: #666;">Waiting for SEWA Cloud</p>

    <div class="capacity-box">
        <div style="font-weight: bold; color: #555;">Bin Fill Level: <span id="pct-text">0%</span></div>
        <div class="progress-bar-bg">
            <div class="progress-fill" id="progress-fill" style="background-color: #4caf50;"></div>
        </div>
        <div style="font-size: 12px; color: #888; margin-top: 5px;"><span id="weight-text">0 / 10 kg</span></div>
    </div>

    <div class="bin-wrapper">
        <div id="bin-lid" class="bin-lid"></div>
        <div class="bin-body" id="drop-zone">
            <div class="qr-sticker" id="qr-display"></div>
        </div>
        <div id="waste-item" draggable="true">📱</div>
    </div>

    <div class="sensor-toggle" id="sensor-ui">
        <label style="font-weight: bold; color: #333; font-size: 14px;">Select item being dropped:</label>
        <select id="item-selector" class="item-dropdown">
            <option value="Broken Smartphone">📱 Broken Smartphone (Metal)</option>
            <option value="Laptop Motherboard">💻 Laptop Motherboard (Metal)</option>
            <option value="damaged pc">💻 PC waste (Metal)</option>
            <option value="cpu scrap">💻 cpu scrap (Metal)</option>
            <option value="Copper Wire Scrap">🔌 Copper Wire Scrap (Metal)</option>
            <option value="Plastic Bottle">🥤 Plastic Bottle (Trash)</option>
        </select>
        
        <label style="font-weight: bold; font-size: 14px; cursor: pointer; color: #2e7d32;">
            <input type="checkbox" id="is-metal" checked> 🧲 Metal Sensor Triggered
        </label>
    </div>
</div>

<script>
    const SERVER_URL = "https://sewa-o947.onrender.com"; 
    const BIN_ID = "BIN002"; 
    
    // FIX: Removed strict websocket transport to allow fallback polling
    const socket = io(SERVER_URL);
    
    let userId = null;
    let isFull = false;

    // Dynamically generate QR code
    const qrData = JSON.stringify({ binId: BIN_ID });
    document.getElementById("qr-display").innerHTML = 
        `<img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(qrData)}" style="width:100%">`;

    // ==========================================
    // 1. STATUS CHECK
    // ==========================================
    async function checkAndAlertAdmin() {
        try {
            const res = await fetch(`${SERVER_URL}/bin/status/${BIN_ID}`);
            const data = await res.json();
            
            if (data.success) {
                if (!isFull) {
                    document.getElementById("status-text").innerText = "ONLINE"; 
                    document.getElementById("status-text").style.color = "#2e7d32";
                    document.getElementById("message").innerText = "Ready for scan.";
                }

                updateProgressBar(data.currentWeight, data.maxCapacity, data.fillPercentage);
                
                if (data.fillPercentage >= 90) {
                    if (!isFull) {
                        socket.emit("admin-notification", { 
                            binId: BIN_ID, 
                            message: `🚨 URGENT: Bin ${BIN_ID} is CRITICAL (${data.fillPercentage.toFixed(1)}%).`,
                            type: "BIN_FULL" 
                        });
                        isFull = true; 
                        document.getElementById("status-text").innerText = "BIN FULL";
                        document.getElementById("status-text").style.color = "red";
                        document.getElementById("message").innerText = "Cannot accept more waste.";
                    }
                } else {
                    isFull = false;
                }
            }
        } catch (e) {
            document.getElementById("status-text").innerText = "SERVER ERROR";
            document.getElementById("status-text").style.color = "red";
        }
    }

    checkAndAlertAdmin();
    setInterval(checkAndAlertAdmin, 300000); // Check every 5 mins

    function updateProgressBar(current, max, pct) {
        const fillEl = document.getElementById("progress-fill");
        document.getElementById("pct-text").innerText = `${pct.toFixed(1)}%`;
        document.getElementById("weight-text").innerText = `${current.toFixed(2)} / ${max} kg`;
        fillEl.style.width = `${Math.min(pct, 100)}%`;

        if (pct >= 80) fillEl.style.backgroundColor = "#f44336"; 
        else if (pct >= 50) fillEl.style.backgroundColor = "#ff9800"; 
        else fillEl.style.backgroundColor = "#4caf50"; 
    }

    // ==========================================
    // 2. SOCKET LISTENER & UNLOCK LOGIC
    // ==========================================
    
    socket.on("connect", () => {
        console.log("✅ Connected to Socket Server");
    });

    socket.onAny((eventName, data) => {
        console.log(`[SOCKET RECEIVE] ${eventName}:`, data);
        
        // Ensure the event is an admin-notification and the bin isn't full
        if (eventName === "admin-notification" && data && !isFull) {
            
            // FIX: Robust string matching (handles extra spaces)
            const incomingType = (data.type || "").trim();
            const incomingBinId = (data.binId || "").trim();
            
            if (incomingType === "BIN_ACCESS" && incomingBinId === BIN_ID) {
                document.getElementById("message").innerText = "🟢 Unlock Signal Received!";
                document.getElementById("message").style.color = "green";
                
                userId = data.userId || "Citizen";
                openBin();
            }
        }
    });

    function openBin() {
        document.getElementById("status-text").innerText = "UNLOCKED";
        document.getElementById("status-text").style.color = "#f57c00";
        document.getElementById("message").innerText = "Select an item, then drag it in.";
        
        document.getElementById("bin-lid").classList.add("open");
        document.getElementById("sensor-ui").style.display = "block";
        
        setTimeout(() => document.getElementById("waste-item").style.display = "flex", 500);
    }

    // ==========================================
    // 3. DRAG, DROP & WEIGH
    // ==========================================
    const item = document.getElementById("waste-item");
    const dropZone = document.getElementById("drop-zone");

    item.ondragstart = (e) => e.dataTransfer.setData("text", "item");
    dropZone.ondragover = (e) => e.preventDefault();
    dropZone.ondrop = (e) => {
        e.preventDefault();
        item.style.display = "none"; 
        completeProcess();
    };

    async function completeProcess() {
        if (!userId) return;

        document.getElementById("status-text").innerText = "WEIGHING...";
        const itemDropdown = document.getElementById("item-selector");
        const selectedItem = itemDropdown.options[itemDropdown.selectedIndex].value;
        const isMetal = document.getElementById("is-metal").checked;

        let weight = 0.2;
        if (selectedItem.includes("Laptop")) weight = 1.5;
        else if (selectedItem.includes("Wire")) weight = 0.5;
        else if (selectedItem.includes("damaged pc")) weight = 5;
        else if (selectedItem.includes("cpu scrap")) weight = 10;
        else if (selectedItem.includes("Smartphone")) weight = 0.3;

        setTimeout(async () => {
            document.getElementById("bin-lid").classList.remove("open");
            document.getElementById("status-text").innerText = "SYNCING DB...";
            
            try {
                const res = await fetch(`${SERVER_URL}/bin/hardware-deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ binId: BIN_ID, userId: userId, weight: weight, itemName: selectedItem, isMetal: isMetal })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    document.getElementById("status-text").innerText = "SUCCESS";
                    document.getElementById("status-text").style.color = "green";
                    document.getElementById("message").innerText = `Secured ${selectedItem} | +${result.pointsEarned} Pts!`;
                    setTimeout(checkAndAlertAdmin, 1000); 
                } else {
                    document.getElementById("status-text").innerText = "REJECTED";
                    document.getElementById("status-text").style.color = "red";
                    document.getElementById("message").innerText = result.message || "Deposit Failed"; 
                }
            } catch (e) {
                document.getElementById("status-text").innerText = "NETWORK ERROR";
                document.getElementById("status-text").style.color = "red";
            }
            setTimeout(() => location.reload(), 4500);
        }, 2000);
    }
</script>
</body>
</html>
